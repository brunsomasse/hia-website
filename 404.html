<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Hope International Association</title>
<link rel="icon" type="image/png" href="images/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#070605;color:#f3ecd9;
    font-family:'Jost',sans-serif;font-weight:300;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:40px 24px;
  }
  .logo{height:100px;width:auto;margin-bottom:32px;filter:drop-shadow(0 0 20px rgba(205,166,70,.4));}
  h1{font-family:'Cormorant Garamond',serif;font-size:clamp(60px,10vw,120px);color:rgba(205,166,70,.15);line-height:1;letter-spacing:-.02em;}
  h2{font-family:'Cormorant Garamond',serif;font-size:clamp(22px,4vw,36px);color:#f3ecd9;margin-top:12px;}
  p{margin-top:16px;font-size:15px;color:#cabf9f;max-width:400px;line-height:1.8;}
  .btn{
    display:inline-block;margin-top:36px;
    background:linear-gradient(135deg,#f1d98a,#cda646 55%,#8a6a26);
    color:#1a1305;padding:13px 32px;border-radius:2px;
    font-family:'Jost';font-weight:600;font-size:13px;letter-spacing:.05em;
    text-transform:uppercase;text-decoration:none;
    box-shadow:0 4px 18px rgba(205,166,70,.25);
    transition:transform .25s, box-shadow .25s;
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(205,166,70,.4);}
</style>
</head>
<body>
  <img src="images/logo.png" alt="H.I.A" class="logo">
  <h1>404</h1>
  <h2>Page not found.</h2>
  <p>The page you're looking for doesn't exist or has been moved. Let's get you back to where hope lives.</p>
  <a href="/" class="btn">Back to Home</a>
</body>
</html>
